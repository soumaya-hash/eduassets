{% extends 'base.html' %}
{% block title %}Supprimer un véhicule{% endblock %}
{% block content %}
<h1>Supprimer un véhicule</h1>
<p>Êtes-vous sûr de vouloir supprimer le véhicule <strong>{{ vehicule }}</strong> ?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Oui, supprimer</button>
    <a href="{% url 'liste_vehicules' %}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
