{% extends 'base.html' %}
{% block title %}Supprimer une maintenance{% endblock %}
{% block content %}
<h1>Supprimer la maintenance</h1>
<p>Confirmez-vous la suppression de cette intervention ?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Supprimer</button>
    <a href="{% url 'liste_maintenances' %}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
