{% extends 'base.html' %}
{% block title %}{{ page_title|default:action|add:' une maintenance' }}{% endblock %}
{% block content %}
<h1>{{ page_title|default:action|add:' une maintenance' }}</h1>
<form method="post" class="card p-4 shadow-sm">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Enregistrer</button>
    <a href="{% url cancel_url_name|default:'liste_maintenances' %}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
