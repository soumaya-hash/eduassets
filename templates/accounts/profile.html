{% extends 'base.html' %}
{% block title %}Profil utilisateur{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="h3 mb-1">Profil utilisateur</h1>
                    <p class="text-muted mb-0">Gérez vos informations de compte.</p>
                </div>
                <span class="badge bg-primary">{{ selected_role_display|default:user.get_role_display }}</span>
            </div>

            <form method="post" class="row g-3">
                {% csrf_token %}
                <div class="col-md-6">
                    <label class="form-label">Nom d'utilisateur</label>
                    <input type="text" class="form-control" value="{{ user.username }}" disabled>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Adresse e-mail</label>
                    <input type="email" name="email" class="form-control" value="{{ user.email }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Prénom</label>
                    <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Nom</label>
                    <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}">
                </div>
                <div class="col-12">
                    <label class="form-label">Rôle actuel</label>
                    <input type="text" class="form-control" value="{{ selected_role_display|default:user.get_role_display }}" disabled>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
