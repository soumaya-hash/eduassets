{% extends 'base.html' %}
{% block title %}Supprimer une mission{% endblock %}
{% block content %}
<h1>Supprimer une mission</h1>
<form method="post" class="card p-4 shadow-sm">
    {% csrf_token %}
    <p>Voulez-vous supprimer la mission <strong>{{ mission.reference_om }}</strong> ?</p>
    <button type="submit" class="btn btn-danger">Supprimer</button>
    <a href="{% url 'liste_missions' %}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
