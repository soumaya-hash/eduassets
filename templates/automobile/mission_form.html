{% extends 'base.html' %}
{% block title %}{{ action }} une mission{% endblock %}
{% block content %}
<h1>{{ action }} une mission</h1>
<p class="text-muted">La distance parcourue est calculée automatiquement à partir des deux kilométrages.</p>
<form method="post" class="card p-4 shadow-sm">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Enregistrer</button>
    <a href="{% url 'liste_missions' %}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
