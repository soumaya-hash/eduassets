{% extends 'base.html' %}
{% block title %}{{ action }} un équipement{% endblock %}
{% block content %}
<h1>{{ action }} un équipement</h1>
<form method="post" class="card p-4 shadow-sm">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Enregistrer</button>
    <a href="{% url 'liste_equipements' %}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
